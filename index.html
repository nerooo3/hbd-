<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Soma ☀️</title>
<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:linear-gradient(135deg,#ffd1e8,#ffeef7);
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.card{
background:white;
width:90%;
max-width:700px;
padding:30px;
border-radius:25px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.15);
position:relative;
z-index:2;
}

h1{
color:#ff5ca8;
}

.cat{
font-size:80px;
margin:10px 0;
}

.sun{
font-size:50px;
animation:spin 10s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

button{
background:#ff78b5;
border:none;
color:white;
padding:14px 24px;
border-radius:12px;
font-size:18px;
cursor:pointer;
}

button:hover{
transform:scale(1.05);
}

#message{
display:none;
margin-top:20px;
font-size:18px;
line-height:1.6;
}

.heart{
position:absolute;
font-size:22px;
animation:float 6s linear forwards;
}

@keyframes float{
0%{
transform:translateY(100vh);
opacity:1;
}
100%{
transform:translateY(-120vh);
opacity:0;
}
}
</style>
</head>
<body>
<audio id="music" controls>
<source src="Christina Perri  You Are My Sunshine (lyrics).m4a" type="audio/mp4">
</audio>
<div class="card">
<div class="sun">☀️</div>
<h1>🎂 Happy Birthday Soma 🎂</h1>
<div class="cat">🐱💖</div>
<p>
My sunshine ☀️<br>
Today is all about you.
</p>
<button onclick="showMessage()">
Open Your Surprise ✨
</button>
<div id="message">
<h2>💌 For Soma 💌</h2>
<p>
You are my sunshine.<br>
My happiness.<br>
My favorite person. ❤️
</p>
<p>
I hope your birthday is filled with joy,
love, smiles, and sunshine ☀️💕
</p>
<p>
Love,<br>
Nero ☀️❤️
</p>
</div>
</div>
<script>
function showMessage(){
document.getElementById('message').style.display='block';

const music=document.getElementById('music');
music.play();
}

setInterval(()=>{
const heart=document.createElement('div');
heart.className='heart';
heart.innerHTML='💖';

heart.style.left=Math.random()*100+'vw';

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},6000);

},400);
</script>
</body>
